<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuddit AI Recommendation System</title>
    
    <!-- Google Fonts: Be Vietnam Pro and Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="container">
            <h1>Fuddit</h1>
            <p class="subtitle">Personalized dining recommendations powered by Groq.</p>
        </div>
    </header>

    <main class="container layout-grid">
        <!-- Sidebar / Form Column -->
        <aside class="preferences-panel level-1-surface rounded-lg">
            <h2>Find Your Next Meal</h2>
            <form id="preferences-form">
                
                <div class="form-group">
                    <label for="location" class="label-md">Location</label>
                    <select id="location" required>
                        <option value="">Loading locations...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="budget" class="label-md">Budget (Upper Limit): ₹<span id="budget-val">1000</span></label>
                    <input type="range" id="budget" min="100" max="5000" step="100" value="1000">
                </div>

                <div class="form-group">
                    <label for="diet" class="label-md">Dietary Preference</label>
                    <select id="diet" required>
                        <option value="any">Any</option>
                        <option value="veg">Pure Veg</option>
                        <option value="non-veg">Non-Veg</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cuisine" class="label-md">Cuisine Preference</label>
                    <select id="cuisine" required>
                        <option value="" disabled selected>Select a cuisine</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="min-rating" class="label-md">Minimum Rating: <span id="rating-val">4.0</span></label>
                    <input type="range" id="min-rating" min="0" max="5" step="0.1" value="4.0">
                </div>

                <div class="form-group">
                    <label for="additional" class="label-md">Additional Preferences</label>
                    <textarea id="additional" placeholder="e.g. family-friendly, quick service, rooftop..."></textarea>
                </div>

                <button type="submit" class="btn-primary rounded">Get Recommendations</button>
            </form>
        </aside>

        <!-- Main Content Column -->
        <section class="results-panel">
            <div id="loading-state" class="hidden">
                <div class="spinner"></div>
                <p>Curating recommendations...</p>
            </div>
            
            <div id="error-state" class="hidden level-1-surface rounded-lg error-banner">
                <h3>No Matches Found</h3>
                <p id="error-msg"></p>
            </div>

            <div id="results-state" class="hidden">
                <div class="ai-summary level-1-surface rounded-lg mb-lg">
                    <h3 class="label-md text-primary">AI SUMMARY</h3>
                    <p id="summary-text" class="body-lg"></p>
                    <p class="meta-stats label-md" id="meta-stats"></p>
                </div>

                <div class="recommendations-grid" id="recommendations-grid">
                    <!-- Cards injected via JS -->
                </div>
            </div>
            
            <div id="empty-state" class="empty-state">
                <p class="body-lg">Select your preferences and discover amazing restaurants curated just for you.</p>
            </div>
        </section>
    </main>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
